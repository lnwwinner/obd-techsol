<!DOCTYPE html>
<html>
<head>
<title>Mode Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
body { margin:0; background:#0f172a; color:#fff; }
#map { height:80vh; }
.panel { padding:10px; }
</style>
</head>
<body>

<div class="panel">
Mode:
<select id="mode">
<option value="random">Random</option>
<option value="real">Real Data</option>
</select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let map = L.map('map').setView([13.75,100.50],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker = L.marker([13.75,100.50]).addTo(map);

async function update() {
    let mode = document.getElementById('mode').value;

    if(mode === 'random'){
        let lat = 13.75 + Math.random()*0.01;
        let lon = 100.50 + Math.random()*0.01;

        await fetch('http://localhost:8000/data',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({vehicle_id:'TRUCK001',lat,lon,speed:80,fuel:40})
        });

        marker.setLatLng([lat,lon]);
        map.panTo([lat,lon]);

    } else {
        const res = await fetch('http://localhost:8000/vehicle/TRUCK001/latest');
        const d = await res.json();

        if(d.lat){
            marker.setLatLng([d.lat,d.lon]);
            map.panTo([d.lat,d.lon]);
        }
    }
}

setInterval(update,3000);
</script>

</body>
</html>
