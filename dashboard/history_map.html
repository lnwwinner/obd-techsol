<!DOCTYPE html>
<html>
<head>
    <title>History Route</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin:0; }
        #map { height:100vh; }
    </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let map = L.map('map').setView([13.75, 100.50], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

async function loadHistory() {
    const res = await fetch('http://localhost:8000/vehicle/TRUCK001/history');
    const data = await res.json();

    let latlngs = data.map(d => [d.lat, d.lon]);

    let polyline = L.polyline(latlngs, {color: 'lime'}).addTo(map);
    map.fitBounds(polyline.getBounds());
}

loadHistory();
</script>
</body>
</html>
